<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- critical: full-fit viewport, no scaling, webview covers everything -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>BS NEBULA • PREMIUM</title>
  <!-- lottie (lightweight) + gsap not needed, pure css+js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.9.6/lottie.min.js"></script>
  <style>
    /* RESET & FULL BOUNDS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #03050a;
      position: fixed;
      top: 0;
      left: 0;
    }

    #webview-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0b0e17;
      z-index: 1;
      overflow: hidden;
    }

    #webview-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
      display: block;
    }

    /* FLOATING NEBULA BUTTON — same premium vibe */
    #floatBtn {
      position: fixed;
      bottom: 90px;
      right: 25px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 9999;
      background: radial-gradient(circle at 30% 30%, #ffffff, #b77eff);
      box-shadow: 0 0 30px #8a2be2, 0 0 60px #4a00e0, 0 0 100px #00f0ff;
      touch-action: none;
      user-select: none;
      border: 2px solid rgba(255,255,255,0.6);
      transition: box-shadow 0.3s, transform 0.2s;
      color: #0b0e17;
      text-shadow: 0 0 10px white;
      transform: scale(1);
      animation: floatGlow 3s infinite alternate;
    }
    #floatBtn::before {
      content: "";
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid rgba(255, 215, 0, 0.5);
      animation: spinSlow 8s linear infinite;
      opacity: 0.7;
    }
    #floatBtn::after {
      content: "";
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 200, 0, 0.25) 0%, transparent 70%);
      animation: pulseSoft 3s infinite alternate;
    }

    @keyframes spinSlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulseSoft { 0% { transform: scale(0.8); opacity: 0.4; } 100% { transform: scale(1.3); opacity: 0.9; } }
    @keyframes floatGlow { 0% { box-shadow: 0 0 30px #8a2be2, 0 0 60px #4a00e0; } 100% { box-shadow: 0 0 50px #ff44e6, 0 0 90px #00c8ff; } }

    /* INJECTOR PANEL — smaller, height reduced to ~170px (flexible, but fixed overall) */
    #injector {
      position: fixed;
      width: 260px;               /* slightly reduced width */
      min-height: 170px;          /* exactly 170px minimal, but can grow a bit with content (max ~200px) */
      background: rgba(12, 15, 25, 0.9);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 28px;
      border: 1px solid rgba(255, 215, 0, 0.25);
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 80px rgba(106, 90, 255, 0.6);
      display: none;
      z-index: 100000;
      overflow: hidden;
      touch-action: none;
      color: #fff;
      left: 30px;
      top: 100px;
      transition: border-color 0.3s;
      animation: panelGlow 4s infinite alternate;
    }
    @keyframes panelGlow {
      0% { box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 50px #00e0ff; }
      100% { box-shadow: 0 20px 70px #000, 0 0 100px #ff66cc; }
    }

    #header {
      padding: 8px 16px;          /* smaller header */
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,215,0,0.2);
      background: rgba(0,0,0,0.3);
    }
    #title {
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(120deg, #ffd966, #c0a0ff, #a0f0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200%;
      animation: titleShimmer 6s linear infinite;
    }
    @keyframes titleShimmer { 0% { background-position: 0%; } 100% { background-position: 200%; } }
    #header span {
      cursor: pointer;
      font-size: 20px;
      color: #fffa;
      transition: 0.2s;
      line-height: 1;
      padding: 0 6px;
      border-radius: 40px;
    }
    #header span:hover { 
      color: white; 
      text-shadow: 0 0 15px gold;
      background: rgba(255,255,255,0.1);
    }

    #content {
      padding: 8px 12px;          /* reduced padding */
    }

    /* instruction screen - compact */
    #instructionScreen {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .reg-step {
      background: rgba(20, 30, 45, 0.7);
      border-left: 4px solid #ffb347;
      padding: 8px 10px;
      border-radius: 18px;
      font-size: 12px;
      font-weight: 500;
      color: #f0f4fa;
      text-align: left;
      box-shadow: 0 5px 12px rgba(0,0,0,0.5);
      line-height: 1.4;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,215,0,0.15);
    }
    .green-highlight {
      color: #c0ffb0;
      text-shadow: 0 0 10px #aaffaa;
      font-weight: 800;
      letter-spacing: 0.8px;
      display: block;
      margin-bottom: 3px;
      font-size: 11px;
    }
    .next-btn {
      background: linear-gradient(145deg, #7a4aff, #ff4d9a);
      padding: 10px 10px;
      border-radius: 40px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 0 30px #ff44b0;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      text-align: center;
      margin-top: 6px;
      transition: 0.2s;
      letter-spacing: 1.5px;
    }
    .next-btn:active { transform: scale(0.96); }

    /* main screen (analysis) — compact height */
    #mainScreen {
      display: none;
      text-align: center;
    }

    /* BIG / SMALL only — massive impact, no number */
    .bigText {
      font-size: 52px;            /* even bigger, only BIG or SMALL */
      font-weight: 900;
      letter-spacing: 4px;
      background: linear-gradient(145deg, gold, #ffb6ff, #5ad9ff);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: resultFlow 4s linear infinite;
      margin: 2px 0 0;
      cursor: pointer;
      line-height: 1.1;
      transition: transform 0.1s ease;
      transform-origin: center;
      text-transform: uppercase;
      filter: drop-shadow(0 0 15px rgba(255,215,0,0.8));
    }
    /* zoom class for extra effect (trigger via js) */
    .zoomPop {
      animation: zoomPop 0.3s cubic-bezier(0.18, 1.3, 0.6, 1.2) !important;
    }
    @keyframes zoomPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); text-shadow: 0 0 40px cyan; }
      100% { transform: scale(1); }
    }

    @keyframes resultFlow { 0% { background-position: 0%; } 100% { background-position: 200%; } }
    
    .periodBox {
      margin: 6px 0 8px;
      padding: 8px 6px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(255,215,0,0.3);
      word-break: break-all;
      backdrop-filter: blur(15px);
      letter-spacing: 0.5px;
      color: #cfd9ff;
    }
    .startBtn {
      padding: 10px 10px;
      border-radius: 40px;
      background: linear-gradient(145deg, #9f5aff, #ff3b9b);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(255, 80, 200, 0.7);
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      font-size: 13px;
      margin: 5px 0 5px;
      letter-spacing: 2px;
    }
    .startBtn:active { transform: scale(0.96); }
    .conf {
      margin: 2px 0 2px;
      font-size: 11px;
      font-weight: 700;
      color: #b4f0ff;
      text-shadow: 0 0 10px cyan;
    }
    .latency {
      font-size: 10px;
      opacity: 0.8;
      color: #ccc;
      margin-top: 2px;
    }
    #loader {
      width: 50px;                /* smaller loader fits compact panel */
      height: 50px;
      margin: 0 auto 5px;
      display: none;
      filter: drop-shadow(0 0 15px #ffbb00);
    }

    /* premium toast */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 22px;
      border-radius: 60px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: 0.25s;
      border: 1px solid rgba(255,215,0,0.7);
      box-shadow: 0 0 50px gold;
      z-index: 200001;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
      letter-spacing: 1px;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    .periodUpdate {
      animation: periodFlash 0.6s;
    }
    @keyframes periodFlash {
      0% { background: rgba(255,215,0,0.1); }
      100% { background: rgba(255,255,255,0.05); }
    }
  </style>
</head>
<body>

  <!-- FULLSCREEN WEBVIEW (same as original) -->
  <div id="webview-container">
    <iframe id="webview-frame" src="https://tashanwin15.com/#/register?invitationCode=28481290265" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation" allow="fullscreen; clipboard-write"></iframe>
  </div>

  <!-- FLOATING NEBULA BUTTON -->
  <div id="floatBtn">BS</div>

  <!-- INJECTOR PANEL (smaller, premium, height ~170px) -->
  <div id="injector">
    <div id="header">
      <div id="title">✦ NEBULA PANEL ✦</div>        
      <span onclick="closePanel()">✕</span>        
    </div>
    <div id="content">
      <!-- INSTRUCTION SCREEN (first) -->  
      <div id="instructionScreen">  
        <div class="reg-step">  
          <span class="green-highlight">◉ STEP 1 · REGISTER</span><br>  
          Deposit <strong style="color:#ffd966;">₹1200</strong> to unlock.
        </div>  
        <div class="reg-step" style="border-left-color:#ddaaff;">  
          <span class="green-highlight">⚡ PREMIUM ENGINE</span><br>  
          Neural hack · VIP tool ACTIVE  
        </div>  
        <div class="next-btn" onclick="showMainPanel()">⏎ UNLOCK INJECTOR</div>  
      </div>  

      <!-- MAIN ANALYSIS SCREEN (hidden) — only BIG / SMALL result, no number -->  
      <div id="mainScreen">  
        <div class="bigText" id="resultText">◈</div>  
        <div id="loader"></div>  
        <div class="periodBox" id="period">----</div>  
        <div class="conf" id="confidence">CONFIDENCE --%</div>  
        <div class="startBtn" onclick="startDemo()">⟳ ANALYZE NOW</div>  
        <div class="latency">quantum ping: <span id="ping">-- ms</span></div>  
      </div>  
    </div>        
  </div>  

  <!-- TOAST -->
  <div id="toast">Please wait next period</div>

  <script>
    (function() {
      // ========== lottie premium loader ==========
      const lottieContainer = document.getElementById("loader");
      // use premium lottie (galaxy / cosmic)
      let anim;
      try {
        anim = lottie.loadAnimation({
          container: lottieContainer,
          renderer: "svg",
          loop: true,
          autoplay: false,
          path: "https://assets10.lottiefiles.com/packages/lf20_p8bfn5so.json" // reliable galaxy loader
        });
      } catch (e) {
        // fallback if any error
      }

      // ========== elements ==========
      const floatBtn = document.getElementById("floatBtn");
      const panel = document.getElementById("injector");
      const periodEl = document.getElementById("period");
      const resultText = document.getElementById("resultText");
      const confidenceEl = document.getElementById("confidence");
      const ping = document.getElementById("ping");
      const loader = document.getElementById("loader");
      const toast = document.getElementById("toast");

      const instructionScreen = document.getElementById("instructionScreen");
      const mainScreen = document.getElementById("mainScreen");

      let lastPeriod = "", locked = false;

      // ========== toast helper ==========
      function showToast(msg) {
        toast.innerText = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);
      }
      window.showToast = showToast;

      // ========== update period (IST based) with animation ==========
      function updatePeriod() {
        try {
          const now = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" }));
          const datePart = now.getFullYear() +
            String(now.getMonth() + 1).padStart(2, "0") +
            String(now.getDate()).padStart(2, "0");
          const totalMin = now.getHours() * 60 + now.getMinutes();
          // original style (same as before)
          const p = datePart + "****" + (10001 + totalMin - 330);
          
          if (periodEl.innerText !== p) {
            periodEl.innerText = p;
            periodEl.classList.add('periodUpdate');
            setTimeout(() => periodEl.classList.remove('periodUpdate'), 600);
          }

          if (p !== lastPeriod) {
            lastPeriod = p;
            locked = false;
            resultText.innerText = "◈";   // reset symbol
          }
        } catch (e) {
          periodEl.innerText = "----";
        }
      }
      setInterval(updatePeriod, 1000);
      updatePeriod();

      // ========== start analysis (from main panel) ==========
      window.startDemo = function() {
        if (locked) {
          showToast("Hold for next period");
          return;
        }
        locked = true;
        loader.style.display = "block";
        if (anim) anim.play();   // play premium animation
        resultText.innerText = "";

        setTimeout(() => {
          if (anim) anim.stop();
          loader.style.display = "none";
          
          // ONLY BIG or SMALL (no number). 50/50 chance
          const isBig = Math.random() > 0.5;
          const resultStr = isBig ? "BIG" : "SMALL";
          
          resultText.innerText = resultStr;
          // add zoom pop animation (premium feel)
          resultText.classList.add('zoomPop');
          setTimeout(() => resultText.classList.remove('zoomPop'), 400);

          confidenceEl.innerText = "CONFIDENCE " + (85 + Math.floor(Math.random() * 15)) + "%";
          ping.innerText = (18 + Math.floor(Math.random() * 35)) + " ms";
        }, 2000); // 2 sec analysis
      };

      // ========== clicking on result triggers zoom and toast if locked ==========
      resultText.onclick = () => {
        resultText.classList.add('zoomPop');
        setTimeout(() => resultText.classList.remove('zoomPop'), 400);
        if (locked) showToast("Wait for next period");
      };

      // ========== OPEN PANEL : show instruction first ==========
      floatBtn.onclick = (e) => {
        e.stopPropagation();
        panel.style.left = "30px";
        panel.style.top = "100px";
        panel.style.display = "block";
        floatBtn.style.display = "none";

        instructionScreen.style.display = "flex";
        instructionScreen.style.flexDirection = "column";
        mainScreen.style.display = "none";
      };

      window.closePanel = function() {
        panel.style.display = "none";
        floatBtn.style.display = "flex";
      };

      // ========== NEXT button : hide instruction, show main ==========
      window.showMainPanel = function() {
        instructionScreen.style.display = "none";
        mainScreen.style.display = "block";
      };

      // ========== panel drag (premium smooth) ==========
      let drag = false, dx = 0, dy = 0;
      panel.addEventListener("pointerdown", (e) => {
        drag = true;
        dx = e.clientX - panel.offsetLeft;
        dy = e.clientY - panel.offsetTop;
        panel.setPointerCapture(e.pointerId);
      });

      document.addEventListener("pointermove", (e) => {
        if (!drag) return;
        panel.style.left = (e.clientX - dx) + "px";
        panel.style.top = (e.clientY - dy) + "px";
      });

      document.addEventListener("pointerup", () => {
        drag = false;
      });

      // ========== float button drag ==========
      let fdrag = false, startX, startY, btnX, btnY;
      floatBtn.addEventListener("pointerdown", (e) => {
        fdrag = true;
        startX = e.clientX;
        startY = e.clientY;
        btnX = floatBtn.offsetLeft;
        btnY = floatBtn.offsetTop;
        floatBtn.setPointerCapture(e.pointerId);
      });

      document.addEventListener("pointermove", (e) => {
        if (!fdrag) return;
        let moveX = e.clientX - startX;
        let moveY = e.clientY - startY;
        floatBtn.style.left = (btnX + moveX) + "px";
        floatBtn.style.top = (btnY + moveY) + "px";
        floatBtn.style.right = "auto";
        floatBtn.style.bottom = "auto";
      });

      document.addEventListener("pointerup", () => {
        fdrag = false;
      });

      // initial states
      instructionScreen.style.display = "flex";
      instructionScreen.style.flexDirection = "column";
      mainScreen.style.display = "none";

      // small hack to stop lottie playing when hidden
      const observer = new MutationObserver(() => {
        if (loader.style.display !== 'block' && anim) anim.stop();
      });
      observer.observe(loader, { attributes: true, attributeFilter: ['style'] });

    })();
  </script>
</body>
</html>
